<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eulen - Relevo Jefes de Equipo | Mahou San Miguel</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-12">

    <!-- CABECERA -->
    <header class="bg-amber-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">EULEN</h1>
                <p class="text-xs text-amber-100 font-medium">Control de Relevos - Mahou SM</p>
            </div>
            <div class="bg-amber-700 px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-2">
                <i data-lucide="calendar" class="w-4 h-4"></i>
                <span id="current-date-badge">--/--/----</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <form id="relevo-form" class="space-y-6">
            
            <!-- DATOS GENERALES -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2 border-b pb-2">
                    <i data-lucide="clipboard-list" class="text-amber-600"></i> Datos del Turno
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Jefe de Equipo</label>
                        <input type="text" id="nombre-jefe" required placeholder="Ej. Juan Pérez" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha del Turno</label>
                        <input type="date" id="fecha-turno" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Turno</label>
                        <select id="turno-seleccionado" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition bg-white">
                            <option value="MAÑANA">MAÑANA</option>
                            <option value="TARDE">TARDE</option>
                            <option value="NOCHE">NOCHE</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Incidencias Generales del Turno</label>
                    <textarea id="incidencias-generales" rows="2" placeholder="Resumen rápido del turno..." 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"></textarea>
                </div>
            </div>

            <!-- PUESTOS DE TRABAJO (SECCIONES DINÁMICAS) -->
            <div class="space-y-4">
                <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2 px-1">
                    <i data-lucide="factory" class="text-amber-600"></i> Estado de los Puestos de Trabajo
                </h2>
                
                <div id="secciones-container" class="space-y-4">
                    <!-- Las secciones se inyectan dinámicamente con JavaScript -->
                </div>
            </div>

            <!-- OBSERVACIONES FINALES -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-3">
                <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2 border-b pb-2">
                    <i data-lucide="message-square" class="text-amber-600"></i> Observaciones Finales
                </h2>
                <textarea id="observaciones-finales" rows="3" placeholder="Notas aclaratorias, tareas pendientes para el próximo turno, etc..." 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"></textarea>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <div class="flex flex-col sm:flex-row gap-4 pt-2">
                <button type="button" onclick="window.print()" 
                    class="flex-1 bg-gray-800 text-white font-semibold py-3 px-4 rounded-xl shadow hover:bg-gray-900 transition flex items-center justify-center gap-2">
                    <i data-lucide="printer" class="w-5 h-5"></i> Imprimir / Guardar PDF
                </button>
                <button type="submit" 
                    class="flex-1 bg-amber-600 text-white font-semibold py-3 px-4 rounded-xl shadow hover:bg-amber-700 transition flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> Finalizar y Exportar Datos
                </button>
            </div>
        </form>
    </main>

    <!-- LOGICA JAVASCRIPT -->
    <script>
        // Listado exacto extraído de "7. Julio Relevo jefes equipo"
        const puestos = [
            { id: "linea-1", nombre: "Línea 1" },
            { id: "linea-2", nombre: "Línea 2" },
            { id: "linea-3", nombre: "Línea 3" },
            { id: "linea-4", nombre: "Línea 4" },
            { id: "linea-5", nombre: "Línea 5" },
            { id: "carga-descarga", nombre: "Carga y descarga" },
            { id: "carretillas", nombre: "Carretillas" }
        ];

        // Inicializar la App
        document.addEventListener("DOMContentLoaded", () => {
            renderSecciones();
            establecerFechaYTurnoAutomatico();
            lucide.createIcons(); // Renderiza los iconos visuales
        });

        // Crear los bloques de puesto en el HTML de forma limpia
        function renderSecciones() {
            const container = document.getElementById("secciones-container");
            container.innerHTML = puestos.map(puesto => `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-3 entry-card">
                    <div class="flex justify-between items-center border-b pb-2">
                        <h3 class="font-bold text-gray-800 text-base">${puesto.nombre}</h3>
                        <span class="text-xs bg-gray-100 text-gray-600 font-medium px-2.5 py-1 rounded-full target-label">Estable</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Campo de Texto -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Novedades / Incidencias</label>
                            <textarea id="texto-${puesto.id}" rows="2" placeholder="Sin incidencias reseñables..." 
                                oninput="actualizarBadgeEstado(this, '${puesto.id}')"
                                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"></textarea>
                        </div>
                        
                        <!-- Control de Imagen -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Evidencia Fotográfica</label>
                            <div class="flex items-center gap-3">
                                <label class="cursor-pointer flex items-center gap-2 bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium text-sm px-4 py-2 rounded-lg border border-amber-200 transition">
                                    <i data-lucide="camera" class="w-4 h-4"></i> Capturar / Subir Foto
                                    <input type="file" id="foto-${puesto.id}" accept="image/*" class="hidden" onchange="previsualizarImagen(this, '${puesto.id}')">
                                </label>
                                <button type="button" id="btn-borrar-${puesto.id}" onclick="borrarFoto('${puesto.id}')" class="hidden text-red-500 hover:text-red-700 transition">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <!-- Contenedor de Previsualización -->
                            <div class="mt-2 hidden" id="preview-container-${puesto.id}">
                                <img id="preview-${puesto.id}" src="" alt="Previsualización" class="h-24 w-auto object-cover rounded-lg border shadow-sm">
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Detectar automáticamente el día y el turno según la hora del sistema
        function establecerFechaYTurnoAutomatico() {
            const hoy = new Date();
            
            // Establecer input de fecha
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const dia = String(hoy.getDate()).padStart(2, '0');
            document.getElementById("fecha-turno").value = `${hoy.getFullYear()}-${mes}-${dia}`;
            document.getElementById("current-date-badge").innerText = `${dia}/${mes}/${hoy.getFullYear()}`;

            // Calcular turno por hora
            const hora = hoy.getHours();
            let turno = "MAÑANA"; 
            if (hora >= 14 && hora < 22) {
                turno = "TARDE";
            } else if (hora >= 22 || hora < 6) {
                turno = "NOCHE";
            }
            document.getElementById("turno-seleccionado").value = turno;
        }

        // Cambia el color del badge lateral si escriben texto
        function actualizarBadgeEstado(textarea, id) {
            const card = textarea.closest('.entry-card');
            const badge = card.querySelector('.target-label');
            if (textarea.value.trim().length > 0) {
                badge.innerText = "Con novedades";
                badge.className = "text-xs bg-red-50 text-red-600 font-semibold px-2.5 py-1 rounded-full target-label";
            } else {
                badge.innerText = "Estable";
                badge.className = "text-xs bg-gray-100 text-gray-600 font-medium px-2.5 py-1 rounded-full target-label";
            }
        }

        // Procesar y mostrar la imagen en pantalla en tiempo real
        function previsualizarImagen(input, id) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(`preview-${id}`).src = e.target.result;
                    document.getElementById(`preview-container-${id}`).classList.remove('hidden');
                    document.getElementById(`btn-borrar-${id}`).classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        // Borrar imagen cargada
        function borrarFoto(id) {
            document.getElementById(`foto-${id}`).value = "";
            document.getElementById(`preview-${id}`).src = "";
            document.getElementById(`preview-container-${id}`).classList.add('hidden');
            document.getElementById(`btn-borrar-${id}`).classList.add('hidden');
        }

        // Simular envío de datos guardando un JSON estructurado
        document.getElementById("relevo-form").addEventListener("submit", (e) => {
            e.preventDefault();
            
            const reporte = {
                jefe: document.getElementById("nombre-jefe").value,
                fecha: document.getElementById("fecha-turno").value,
                turno: document.getElementById("turno-seleccionado").value,
                incidenciasGenerales: document.getElementById("incidencias-generales").value,
                puestos: puestos.map(p => ({
                    puesto: p.nombre,
                    novedades: document.getElementById(`texto-${p.id}`).value || "Sin incidencias.",
                    tieneFoto: !!document.getElementById(`foto-${p.id}`).files[0]
                })),
                observacionesFinales: document.getElementById("observaciones-finales").value
            };

            console.log("Reporte Estructurado Listo para guardar:", reporte);
            alert(`¡Reporte de Turno (${reporte.turno}) registrado correctamente de forma local!\nUsa el botón 'Imprimir' si necesitas el formato papel o guardarlo en PDF estructurado.`);
        });
    </script>

    <!-- ESTILOS EXTRAS PARA LA IMPRESIÓN LIMPIA EN PDF -->
    <style>
        @media print {
            header, button, label, input[type="file"], .cursor-pointer { display: none !important; }
            body { background: white; padding: 0; }
            .entry-card { page-break-inside: avoid; border: 1px solid #e5e7eb !important; box-shadow: none !important; margin-bottom: 1rem; }
            textarea, input[type="text"], input[type="date"], select { border: none !important; padding: 0 !important; background: transparent !important; resize: none; }
        }
    </style>
</body>
</html>
